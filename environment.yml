name: myenv
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.2.2
  - torchvision=0.17.2
  - torchaudio=2.2.2
  - numpy=1.26.4
  - pandas>=1.1.4
  - seaborn>=0.11.0
  - matplotlib>=3.2.2
  - pillow>=7.1.2
  - psutil
  - pyyaml>=5.3.1
  - requests>=2.23.0
  - scipy>=1.4.1
  - tqdm>=4.64.0
  - tensorboard>=2.4.1
  - pip
  - Pillow==9.5.0
  - pip:
      - ultralytics
      - export
      - gitpython
      - ipython
      - thop>=0.1.1
      - albumentations>=1.0.3
      - pycocotools>=2.0
